name: Deploy website and documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - assets/brand/wimforge-logo.png
      - assets/site/**
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
      - scripts/mkdocs_hooks.py
      - website/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build website and Material documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install the documentation toolchain
        run: python -m pip install --requirement requirements-docs.txt

      - name: Validate website and generated images
        run: python3 website/tools/check_site.py --repo-root . --require-assets

      - name: Build strict Material documentation under /docs
        shell: bash
        run: |
          sed 's#^site_url:.*#site_url: https://codingmachineedge.github.io/WimForge/docs/#' \
            mkdocs.yml > _mkdocs-pages.yml
          mkdocs build --strict --clean --config-file _mkdocs-pages.yml \
            --site-dir _mkdocs-site

      - name: Assemble one Pages artifact
        shell: bash
        run: |
          mkdir -p _site/assets/brand _site/assets/site _site/docs
          cp -a website/. _site/
          cp assets/brand/wimforge-logo.png _site/assets/brand/wimforge-logo.png
          cp -a assets/site/. _site/assets/site/
          cp -a _mkdocs-site/. _site/docs/
          rm -rf _site/tools
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
