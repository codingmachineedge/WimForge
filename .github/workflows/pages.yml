name: Publish documentation site

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Material documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out the documentation source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install the documentation toolchain
        run: python -m pip install --requirement requirements-docs.txt
      - name: Build the strict documentation site
        run: mkdocs build --strict
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

